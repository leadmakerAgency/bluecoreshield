# yaml-language-server: $schema=https://unpkg.com/@sveltia/cms@0.160.0/schema/sveltia-cms.json
backend:
  name: github
  repo: leadmakerAgency/bluecoreshield

media_folder: "content/media"
public_folder: "/media"

collections:
  - name: posts
    label: Posts
    label_singular: Post
    folder: "content/posts"
    create: true
    format: frontmatter
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - label: "Slug"
        name: "slug"
        widget: "string"
        hint: "URL-friendly slug, e.g. nyc-security-checklist-for-commercial-properties"
        pattern:
          - "^[a-z0-9-]+$"
          - "Use only lowercase letters, numbers, and dashes."
      - label: "Publish Date"
        name: "date"
        widget: "datetime"
        time_format: "HH:mm"
        format: "YYYY-MM-DDTHH:mm:ssZ"
        picker_utc: true
      - label: "Draft"
        name: "draft"
        widget: "boolean"
        default: false
        required: false
        hint: "If enabled, the post stays hidden in production until draft is turned off."
      - { label: "Excerpt", name: "excerpt", widget: "text", hint: "Short summary shown on blog cards and metadata." }
      - { label: "Featured Image", name: "featured_image", widget: "image", required: false, hint: "Optional thumbnail image shown on the blog list." }
      - { label: "Hero Emoji", name: "hero_emoji", widget: "string", required: false, hint: "Optional emoji fallback for blog cards." }
      - { label: "Tags", name: "tags", widget: "list", required: false }
      - label: "Body"
        name: "body"
        widget: "markdown"
        hint: "Wait until image upload finishes before saving so file paths are persisted."
        editor_components:
          - code-block
          - image
